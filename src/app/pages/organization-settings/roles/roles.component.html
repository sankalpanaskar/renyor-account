<div class="roles-list-container">
  <div class="row">
    <div class="col-lg-12">
      <nb-card>
        <nb-card-header class="section-header d-flex justify-content-between align-items-center">
          <span>Roles</span>
          <button
            nbButton
            status="primary"
            size="small"
            shape="semi-round"
            (click)="gotoAddRole()"
          >
            Add Role
          </button>
        </nb-card-header>

        <nb-card-body [nbSpinner]="loading" nbSpinnerStatus="primary">
          <div [class.content-blur]="loading">
            <div class="row mt-3">
              <div class="col-12">
                <ng2-smart-table
                  [settings]="settings"
                  [source]="source">
                </ng2-smart-table>
              </div>
            </div>
          </div>
        </nb-card-body>
      </nb-card>
    </div>
  </div>
</div>
