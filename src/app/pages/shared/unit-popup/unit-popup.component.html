<div class="payment-terms-modal-overlay" *ngIf="open">
  <nb-card class="payment-terms-modal">
    <nb-card-header class="payment-terms-modal-header">
      <span>{{ title }}</span>
      <button type="button" class="modal-close-btn" (click)="closePopup()" aria-label="Close" [disabled]="isSubmitting">
        Close
      </button>
    </nb-card-header>

    <nb-card-body class="payment-terms-modal-body">
      <table class="payment-terms-table">
        <thead>
          <tr>
            <th>Unit Name</th>
            <th>Symbol</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let unit of units" (click)="selectUnit(unit)" class="term-row">
            <td>{{ unit.unitName }}</td>
            <td>{{ unit.symbol }}</td>
          </tr>
          <tr *ngIf="!units || units.length === 0">
            <td colspan="2" class="empty-state">No units added yet.</td>
          </tr>
        </tbody>
      </table>

      <button type="button" nbButton status="primary" size="small" outline class="add-new-link" (click)="startAddUnit()">
        <nb-icon icon="plus-circle"></nb-icon>
        Add New
      </button>

      <div class="payment-term-new-row" *ngIf="showAddForm">
        <div class="row">
          <div class="col-md-8 mb-10">
            <input
              type="text"
              nbInput
              fullWidth
              shape="semi-round"
              placeholder="Unit Name"
              [(ngModel)]="newUnitName"
              [ngModelOptions]="{standalone: true}"
              [disabled]="isSubmitting"
            >
          </div>
          <div class="col-md-4 mb-10">
            <input
              type="text"
              nbInput
              fullWidth
              shape="semi-round"
              placeholder="Symbol"
              [(ngModel)]="newUnitSymbol"
              [ngModelOptions]="{standalone: true}"
              [disabled]="isSubmitting"
            >
          </div>
        </div>
        <div class="payment-term-new-actions">
          <button type="button" nbButton status="success" size="small" (click)="saveUnit()" [disabled]="isSubmitting">
            {{ isSubmitting ? 'Submitting...' : 'Submit' }}
          </button>
          <button type="button" nbButton status="basic" size="small" (click)="cancelAddUnit()" [disabled]="isSubmitting">
            Cancel
          </button>
        </div>
      </div>
    </nb-card-body>
  </nb-card>
</div>
